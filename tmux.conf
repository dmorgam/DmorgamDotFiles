# Tmux config

# ----- User config ---------------------------------------

# Start windows and panes at 1, not 0
set-option -g status-position top
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 50000
set-window-option -g mode-keys vi
set -g mouse on
set -g renumber-windows on
set -g focus-events on
set -sg escape-time 0

# Leader to A
set -g prefix C-a

# Splits preserving current path
bind '"' split-window -h -c "#{pane_current_path}"
bind '%' split-window -v -c "#{pane_current_path}"

# Reload tmux
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config recargada ✓"

# Fix colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Passthrough para bracketed paste (En WSL/Windows Terminal)
set -g allow-passthrough on
set -as terminal-features ',*:clipboard'

# ----- TPM Plugins ---------------------------------------
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'slanted'
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_middle_separator "#[fg=#{E:@catppuccin_status_module_text_bg},reverse]#[none]"
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "yes"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g window-status-separator ""

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#[fg=#{E:@catppuccin_window_text_color},bg=#{E:@_ctp_status_bg}]█#[none]"
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

run '~/.tmux/plugins/tpm/tpm'
