format = """\
[в•ӯв•ҙ](fg:lavender)\
$username\
$directory\
(\
    $git_branch\
    $git_status\
)\
(\
    $python\
    $nodejs\
    $java\
    $golang\
    $helm\
    $rust\
    $lua\
    $terraform\
    $aws\
    $azure\
    $kubernetes\
)
[в•°в”Җ](fg:lavender)$status$jobs$character\
"""

right_format = """\
$cmd_duration\
"""

add_newline = true

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[username]
format = '[оӮ¶](fg:mauve)[уұҗӢ ](bg:mauve fg:base)[ $user](bg:base fg:mauve)[оӮҙ](fg:base)'

disabled = false
show_always = true

[character]
success_symbol = "[вқҜ](fg:green)"
error_symbol = "[вқҜ](fg:red)"
vimcmd_symbol = "[вқ®](fg:green)"

[directory]
format = " [оӮ¶](fg:sapphire)[пҒј ](bg:sapphire fg:base)[ $path ](bg:base fg:sapphire)[$read_only](bg:sapphire fg:yellow)[оӮҙ](fg:base)"
truncation_length = 3
truncation_symbol = "вҖҰ/"
truncate_to_repo = true
read_only =" о©ө "

[cmd_duration]
format = " [оӮ¶](fg:maroon)[пү” ](bg:maroon fg:base)[ $duration](bg:base fg:maroon)[оӮҙ](fg:base)"
min_time = 500

[git_branch]
format = " [оӮ¶](fg:yellow)[пҗҳ ](fg:base bg:yellow)[ $branch](fg:yellow bg:base)[оӮҙ](fg:base)"

[git_status]
format = '[ оӮ¶](fg:peach)[п‘Җ ](bg:peach fg:base)[ $all_status$ahead_behind ](bg:base fg:peach)[оӮҙ](fg:base)'
up_to_date = 'пҖҢ'

[java]
format = "[ оӮ¶](fg:flamingo)[$symbol](bg:flamingo fg:base)[ $version](bg:base fg:flamingo)[оӮҙ](fg:base)"
version_format = "${raw}"
symbol = "оү– "
disabled = false

[nodejs]
format = "[ оӮ¶](fg:yellow)[$symbol](bg:yellow fg:base)[ $version](bg:base fg:yellow)[оӮҙ](fg:base)"
symbol = "оңҳ "
version_format = "${raw}"
disabled=false

[rust]
format = "[ оӮ¶](fg:red)[$symbol](bg:red fg:base)[ $version](bg:base fg:red)[оӮҙ](fg:base)"
symbol = "оҡӢ "
version_format = "${raw}"
disabled=false

[python]
format = '[ оӮ¶](fg:green)[${symbol}](bg:green fg:base)[ ${pyenv_prefix}(${version} )(\($virtualenv\))](bg:base fg:green)[оӮҙ](fg:base)'
symbol = "оҳҶ "
version_format = "${raw}"
disabled=false

[c]
format = "[ оӮ¶](fg:blue)[$symbol](bg:blue fg:base)[ ($version(-$name) )](bg:base fg:blue)[оӮҙ](fg:base)"
symbol = "оҳһ "
version_format = "${raw}"
disabled=true

[golang]
format = "[ оӮ¶](fg:teal)[$symbol](bg:teal fg:base)[ $version](bg:base fg:teal)[оӮҙ](fg:base)"
symbol = "оҳ§ "
version_format = "${raw}"
disabled=false

[helm]
format = "[ оӮ¶](fg:sky)[$symbol](bg:sky fg:base)[ $version](bg:base fg:sky)[оӮҙ](fg:base)"
symbol = "оҹ» "
version_format = "${raw}"
disabled=false

[lua]
format = "[ оӮ¶](fg:blue)[$symbol](bg:blue fg:base)[ $version](bg:base fg:blue)[оӮҙ](fg:base)"
symbol = "оҳ  "
version_format = "${raw}"
disabled=false

[terraform]
format = "[ оӮ¶](fg:mauve)[$symbol](bg:mauve fg:base)[ $version $workspace](bg:base fg:mauve)[оӮҙ](fg:base)"
symbol = "оўҪ "
version_format = "${raw}"
disabled=false

[aws]
format = "[ оӮ¶](fg:peach)[$symbol](bg:peach fg:base)[ $region](bg:base fg:peach)[оӮҙ](fg:base)"
symbol = "пү° "
disabled=false

[azure]
format = "[ оӮ¶](fg:blue)[$symbol](bg:blue fg:base)[ $subscription](bg:base fg:blue)[оӮҙ](fg:base)"
symbol = "у° … "
disabled=false

[kubernetes]
format = "[ оӮ¶](fg:blue)[$symbol](bg:blue fg:base)[ $context](bg:base fg:blue)[оӮҙ](fg:base)"
symbol = "вҳё  "
disabled=false

[status]
format = '[ $symbol](fg:red)[ $status](fg:peach)'
symbol = "вңҳ"
disabled = false

[jobs]
format = "[ $symbol $number](fg:peach)"
symbol = "пӮ®"
threshold = 1
